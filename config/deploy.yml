# Kamal 部署配置
# 用于将 ZheliRead 部署到阿里云服务器

service: zheli_read
image: voicebook/zheli_read

# ==================== 服务器配置 ====================
servers:
  web:
    hosts:
      - 8.136.142.85
  worker:
    hosts:
      - 8.136.142.85
    cmd: "bundle exec sidekiq -C config/sidekiq.yml"
  migrate:
    hosts:
      - 8.136.142.85
    cmd: "bin/rails db:migrate"

# ==================== 部署超时 ====================
# 数据库迁移时间较长，增加超时
deploy_timeout: 90
drain_timeout: 30

# ==================== Docker Registry 配置 ====================
registry:
  server: reg.ylb.im
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# ==================== 环境变量 ====================
env:
  clear:
    RAILS_ENV: production
    WEB_CONCURRENCY: 2
    RAILS_MAX_THREADS: 5
    TZ: Asia/Shanghai
  secret:
    # 生产环境数据库
    - DATABASE_PRD_USERNAME
    - DATABASE_PRD_PASSWORD
    - DATABASE_PRD_HOST
    - DATABASE_PRD_PORT
    - DATABASE_PRD_DATABASE
    - SECRET_KEY_BASE
    - ALIYUN_ACCESS_KEY_ID
    - ALIYUN_ACCESS_KEY_SECRET
    - ALIYUN_OSS_BUCKET
    - ALIYUN_OSS_BUCKET_OPEN
    - ALIYUN_OSS_INTERNAL
    - ALIYUN_OSS_ENDPOINT
    - REDIS_URL
    - REDIS_PASSWORD

# ==================== SSH 配置 ====================
ssh:
  user: root
  port: 22
  keys:
    - /Users/luolin/.ssh/id_rsa

# ==================== kamal-proxy 代理 ====================
proxy:
  ssl: true
  host: bookweb.haoqiniu.com
  healthcheck:
    path: /up
    interval: 5
    timeout: 5

# ==================== 构建配置 ====================
# 远端构建：在阿里云服务器上 build，解决国内拉取 Docker Hub 镜像慢的问题
builder:
  arch: amd64

# ==================== 数据卷挂载 ====================
volumes:
  - /zheli_read/log:/rails/log
  - /zheli_read/tmp:/rails/tmp

# ==================== Hooks 输出 ====================
hooks_output: verbose