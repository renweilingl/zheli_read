# Kamal 测试环境部署配置
# 部署到测试服务器 8.136.142.85

service: zheli_read-staging
image: zheli_read/zheli_read-staging

# ==================== 服务器配置 ====================
servers:
  web:
    hosts:
      - 8.136.142.85
  worker:
    hosts:
      - 8.136.142.85
    cmd: "bundle exec sidekiq -C config/sidekiq.yml"

# ==================== Docker Registry 配置 ====================
registry:
  server: reg.ylb.im
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

# ==================== 环境变量 ====================
env:
  clear:
    RAILS_ENV: production
    WEB_CONCURRENCY: 1
    RAILS_MAX_THREADS: 3
    TZ: Asia/Shanghai
  secret:
    - SECRET_KEY_BASE
    - DATABASE_DEV_USERNAME
    - DATABASE_DEV_PASSWORD
    - DATABASE_DEV_HOST
    - DATABASE_DEV_PORT
    - DATABASE_DEV_DATABASE
    - ALIYUN_ACCESS_KEY_ID
    - ALIYUN_ACCESS_KEY_SECRET
    - REDIS_URL
    - REDIS_PASSWORD

# ==================== SSH 配置 ====================
ssh:
  user: root
  port: 22
  keys:
    - /Users/luolin/.ssh/id_rsa

# ==================== 构建配置 ====================
builder:
  arch: amd64

# ==================== 数据卷挂载 ====================
volumes:
  - /zheli_read-staging/log:/rails/log

# ==================== kamal-proxy 代理 ====================
proxy:
  ssl: true
  host: testbookweb.haoqiniu.com
  healthcheck:
    path: /up
    interval: 5
    timeout: 5
